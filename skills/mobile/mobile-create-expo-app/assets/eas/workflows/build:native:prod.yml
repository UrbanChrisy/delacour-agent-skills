name: build:native:prod

defaults:
  tools:
    bun: 1.3.5
  run:
    working_directory: <WORKING_DIRECTORY>

on:
  push:
    branches:
      - release/app/*

jobs:
  # Extract version from branch name (e.g. release/app/1.0.0 -> 1.0.0)
  extract_version:
    name: Extract Version
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - id: parse
        name: Parse version from branch
        working_directory: .
        run: |
          REF_NAME="${{ github.ref_name }}"
          VERSION="${REF_NAME##release/app/}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi
          echo "Version: $VERSION"
          set-output version "$VERSION"

  # Generate fingerprint
  fingerprint:
    name: Generate Fingerprint
    type: fingerprint
    needs: [extract_version]

  # Build Android
  build_android:
    name: Build Android
    type: build
    needs: [fingerprint, extract_version]
    env:
      APP_VERSION: ${{ needs.extract_version.outputs.version }}
    params:
      platform: android
      profile: production

  # Build iOS
  build_ios:
    name: Build iOS
    type: build
    needs: [fingerprint, extract_version]
    env:
      APP_VERSION: ${{ needs.extract_version.outputs.version }}
    params:
      platform: ios
      profile: production

  # Submit Android Build
  submit_android_build:
    name: Submit Android Build
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}

  # Submit iOS Build
  submit_ios_build:
    name: Submit iOS Build
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
