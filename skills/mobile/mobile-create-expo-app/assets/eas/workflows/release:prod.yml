name: release:prod

defaults:
  tools:
    bun: 1.3.5
  run:
    working_directory: <WORKING_DIRECTORY>

jobs:
  # Extract version from branch name (e.g. release/app/1.0.0 -> 1.0.0)
  extract_version:
    name: Extract Version
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - id: parse
        name: Parse version from branch
        working_directory: .
        run: |
          REF_NAME="${{ github.ref_name }}"
          VERSION="${REF_NAME##release/app/}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi
          echo "Version: $VERSION"
          set-output version "$VERSION"

  # Fingerprint the build
  fingerprint:
    name: Fingerprint
    type: fingerprint
    needs: [extract_version]

  # Check for existing Android build
  get_android_build:
    name: Check for existing android build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: production

  # Check for existing iOS build
  get_ios_build:
    name: Check for existing ios build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production

  # If no existing Android build, build it
  build_android:
    name: Build Android
    needs: [get_android_build, extract_version]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.extract_version.outputs.version }}
    params:
      platform: android
      profile: production

  # If no existing iOS build, build it
  build_ios:
    name: Build iOS
    needs: [get_ios_build, extract_version]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.extract_version.outputs.version }}
    params:
      platform: ios
      profile: production

  # Waits for Android build to finish then submits it
  submit_android_build:
    name: Submit Android Build
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}

  # Waits for iOS build to finish then submits it
  submit_ios_build:
    name: Submit iOS Build
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}

  # If there is an existing Android build, we want to create an OTA update for it.
  publish_android_update:
    name: Publish Android update
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    type: update
    params:
      branch: production
      platform: android

  # If there is an existing iOS build, we want to create an OTA update for it.
  publish_ios_update:
    name: Publish iOS update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    params:
      branch: production
      platform: ios

